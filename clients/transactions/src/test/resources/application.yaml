spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: transactions-java-server
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            token-uri: http://keycloak:8082/auth/realms/transactions

client:
  transactions:
    base-url: http://localhost:8080